<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>채무조정 상담 도구</title>
<script src="https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js"></script>
<style>
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css');
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  /* C: 순백 배경 + 높은 대비 텍스트 */
  --bg: #f8f9fb; --surface: #ffffff; --surface-alt: #f8f9fa;
  --border: #e5e7eb; --border-light: #f0f1f3;
  --text: #111827; --text-sub: #6b7280; --text-dim: #9ca3af;
  /* C: 네이비 단일 액센트 */
  --accent: #1e3a5f; --accent-dark: #0f2340; --accent-light: #e8eef6;
  /* 기본: 명확한 시맨틱 컬러 */
  --green: #059669; --green-bg: #f0fdf4; --green-dark: #064e3b;
  --blue: #2563eb; --blue-bg: #eff6ff; --blue-dark: #1e3a5f;
  --purple: #7c3aed; --purple-bg: #f5f3ff; --purple-dark: #4c1d95;
  --red: #dc2626; --red-bg: #fef2f2; --red-dark: #991b1b;
  --amber: #d97706; --amber-bg: #fffbeb; --amber-dark: #78350f;
  /* C: 작은 radius + 미니멀 그림자 */
  --radius: 10px; --radius-sm: 6px; --radius-xs: 4px;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.06);
  --shadow-lg: 0 8px 24px rgba(0,0,0,0.1);
  --transition: 0.18s ease;
}
body { font-family: 'Pretendard Variable', 'Pretendard', -apple-system, sans-serif; background: var(--bg); color: var(--text); font-size: 14px; -webkit-font-smoothing: antialiased; letter-spacing: -0.01em; }

/* ── 상단 바: C의 단색 + 기본의 미세 그라데이션 */
.top-bar {
  background: linear-gradient(135deg, #1e3a5f 0%, #264d7a 100%);
  color: white; padding: 15px 28px; display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}
.top-bar-left { display: flex; align-items: center; gap: 10px; }
.top-bar h1 { font-size: 16px; font-weight: 700; letter-spacing: -0.4px; }
.top-bar .sub { font-size: 11px; opacity: 0.55; font-weight: 400; letter-spacing: -0.2px; }

.layout { display: grid; grid-template-columns: 380px 1fr; min-height: calc(100vh - 52px); }

/* ── 왼쪽 입력 패널: C의 넉넉한 패딩 + 깔끔한 스크롤바 */
.input-panel { background: var(--surface); border-right: 1px solid var(--border); overflow-y: auto; display: flex; flex-direction: column; }
.input-panel::-webkit-scrollbar { width: 4px; }
.input-panel::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 2px; }
.ip-section { padding: 18px 20px 14px; border-bottom: 1px solid var(--border-light); }
.ip-section:last-child { border-bottom: none; }
/* C: 액센트 컬러 섹션 타이틀 + 넓은 letter-spacing */
.ip-sec-title { font-size: 10px; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 13px; display: flex; align-items: center; gap: 7px; }
.ip-sec-title .ico { font-size: 13px; opacity: 0.7; }

.field { margin-bottom: 13px; position: relative; }
.field:last-child { margin-bottom: 0; }
.field label { display: flex; align-items: center; gap: 4px; font-size: 11px; color: var(--text-sub); font-weight: 600; margin-bottom: 5px; }
.field label .tip-icon { cursor: pointer; font-size: 12px; margin-left: 4px; opacity: 0.4; transition: opacity var(--transition); }
.field label .tip-icon:hover { opacity: 0.9; }
/* C: 1px 보더 + 순백 배경 (가독성 최적) */
.field input, .field select, .field textarea {
  width: 100%; padding: 9px 12px; border: 1px solid var(--border); border-radius: var(--radius-xs);
  font-size: 13px; font-family: inherit; transition: all var(--transition);
  background: var(--surface); color: var(--text);
}
.field textarea { resize: vertical; min-height: 60px; }
.field input:focus, .field select:focus, .field textarea:focus {
  outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(30,58,95,0.08); background: var(--surface);
}
.field input::placeholder, .field textarea::placeholder { color: var(--text-dim); }
.field .sub-hint { font-size: 11px; color: var(--text-dim); margin-top: 3px; }
.field .val-hint { font-size: 11px; color: var(--accent); margin-top: 3px; font-weight: 600; }
.field .warn-hint { font-size: 11px; color: var(--red); margin-top: 3px; font-weight: 600; background: var(--red-bg); padding: 4px 8px; border-radius: var(--radius-xs); }

.row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }

/* 토글 배지: 기본의 pill 형태 + C의 절제된 hover */
.badge-grid { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
.badge { padding: 5px 11px; border-radius: 16px; font-size: 11px; font-weight: 600; cursor: pointer;
  border: 1px solid var(--border); background: var(--surface); color: var(--text-sub);
  transition: all var(--transition); user-select: none; }
.badge:hover { border-color: var(--accent); color: var(--accent); }
.badge.on { background: var(--accent); color: #fff; border-color: var(--accent); }
.badge.on-warn { background: var(--red); color: #fff; border-color: var(--red); }
.badge.on-yellow { background: var(--amber); color: #fff; border-color: var(--amber); }

/* C: 액센트 컬러 툴팁 + 기본의 애니메이션 */
.tooltip-box {
  display: none; position: absolute; left: 0; top: 100%; z-index: 100;
  background: var(--accent); color: #e5eaf2; font-size: 11px; line-height: 1.7;
  padding: 12px 14px; border-radius: var(--radius-sm); width: 320px; max-width: calc(100vw - 32px);
  box-shadow: var(--shadow-lg); white-space: pre-wrap; margin-top: 6px;
  animation: tooltipIn 0.15s ease-out;
}
@keyframes tooltipIn { from { opacity:0; transform:translateY(-4px); } to { opacity:1; transform:translateY(0); } }
.row2 .field:last-child .tooltip-box { left: auto; right: 0; }
.field:hover .tooltip-box, .field .tip-icon:hover + .tooltip-box { display: block; }

/* 하단 버튼: 기본의 그라데이션 + C의 절제된 shadow */
.ip-footer { padding: 14px 20px; background: var(--surface); border-top: 1px solid var(--border-light); position: sticky; bottom: 0; z-index: 10; }
.btn-calc { width: 100%; padding: 13px; background: linear-gradient(135deg, var(--accent-dark), var(--accent)); color: white; border: none; border-radius: var(--radius-sm);
  font-size: 14px; font-weight: 700; cursor: pointer; transition: all var(--transition); font-family: inherit;
  box-shadow: 0 2px 6px rgba(30,58,95,0.2); letter-spacing: -0.2px; }
.btn-calc:hover { box-shadow: 0 4px 12px rgba(30,58,95,0.3); transform: translateY(-1px); }
.btn-calc:active { transform: scale(0.99); }
.btn-reset { width: 100%; padding: 8px; background: none; color: var(--text-dim); border: 1px solid var(--border);
  border-radius: var(--radius-xs); font-size: 12px; cursor: pointer; margin-top: 8px; font-family: inherit;
  transition: all var(--transition); }
.btn-reset:hover { color: var(--text-sub); border-color: #9ca3af; }

/* ── 오른쪽 결과 패널: C의 넉넉한 패딩 */
.result-panel { overflow-y: auto; padding: 26px 30px; display: flex; flex-direction: column; gap: 22px; background: var(--bg); }
.result-panel::-webkit-scrollbar { width: 4px; }
.result-panel::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 2px; }

.placeholder { display: flex; flex-direction: column; align-items: center; justify-content: center;
  flex: 1; color: var(--text-dim); gap: 16px; text-align: center; min-height: 400px; }
.placeholder .ph-icon { font-size: 48px; opacity: 0.4; }

/* 결과 카드: C의 border-left 강조 + 기본의 은은한 배경색 */
.rec-title { font-size: 11px; font-weight: 700; color: var(--accent); text-transform: uppercase;
  letter-spacing: 1px; margin-bottom: 14px; }
.cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); gap: 14px; }

.card { border-radius: var(--radius); padding: 20px; border: 1px solid var(--border); background: var(--surface);
  position: relative; transition: all var(--transition); }
.card:hover { box-shadow: var(--shadow-md); transform: translateY(-1px); }
/* 핵심: border-left 3px 강조(C) + 은은한 배경색(기본) 결합 */
.card.rank1 { border-color: var(--green); border-left: 3px solid var(--green); background: var(--green-bg); }
.card.rank2 { border-color: var(--blue); border-left: 3px solid var(--blue); background: var(--blue-bg); }
.card.rank3 { border-color: var(--purple); border-left: 3px solid var(--purple); background: var(--purple-bg); }
.card.ineligible { border-color: #e5e5e5; background: var(--surface); opacity: 0.6; }

/* 기본의 pill 리본 + C의 미니멀 shadow */
.card-ribbon { position: absolute; top: -10px; left: 14px; padding: 3px 10px;
  border-radius: 14px; font-size: 10px; font-weight: 700; letter-spacing: 0.3px; }
.rank1 .card-ribbon { background: var(--green); color: #fff; box-shadow: 0 1px 4px rgba(5,150,105,0.25); }
.rank2 .card-ribbon { background: var(--blue); color: #fff; box-shadow: 0 1px 4px rgba(37,99,235,0.25); }
.rank3 .card-ribbon { background: var(--purple); color: #fff; box-shadow: 0 1px 4px rgba(124,58,237,0.25); }

/* C: 굵은 font-weight + 넉넉한 간격 */
.card-name { font-size: 16px; font-weight: 800; margin: 10px 0 14px; letter-spacing: -0.4px; }
.rank1 .card-name { color: var(--green-dark); }
.rank2 .card-name { color: var(--blue-dark); }
.rank3 .card-name { color: var(--purple-dark); }
.ineligible .card-name { color: var(--text-dim); }

.kv { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 6px; padding: 3px 0; }
.kv .k { color: var(--text-sub); }
.kv .v { font-weight: 700; }
.kv .v.g { color: var(--green); }
.kv .v.b { color: var(--blue); }
.kv .v.r { color: var(--red); }

.card-desc { font-size: 11px; color: var(--text-sub); margin-top: 12px; padding-top: 12px;
  border-top: 1px solid var(--border-light); line-height: 1.7; }
.card-caution { font-size: 11px; color: var(--amber-dark); background: var(--amber-bg);
  border-radius: var(--radius-xs); padding: 7px 10px; margin-top: 8px; line-height: 1.6; }

/* C: 미니멀 섹션 박스 (그림자 제거) */
.sbox { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); padding: 20px; box-shadow: none; }
.sbox h3 { font-size: 13px; font-weight: 800; color: var(--text); margin-bottom: 14px;
  padding-bottom: 10px; border-bottom: 1px solid var(--border-light); display: flex; align-items: center; gap: 7px; letter-spacing: -0.2px; }

/* 상세 계산 2열 */
.detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
.drow { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 6px; padding: 3px 0; }
.drow .dl { color: var(--text-sub); }
.drow .dv { font-weight: 600; }
/* C: 총계 행에 액센트 컬러 */
.drow.dtotal { border-top: 1px solid var(--border); padding-top: 8px; margin-top: 4px; }
.drow.dtotal .dl { font-weight: 800; color: var(--text); }
.drow.dtotal .dv { font-size: 13px; color: var(--accent); }

/* C: 액센트 컬러 테이블 헤더 + 기본의 테이블 구조 */
.ctable { width: 100%; border-collapse: separate; border-spacing: 0; font-size: 12px; border-radius: var(--radius-sm); overflow: hidden; border: 1px solid var(--border); }
.ctable th { background: var(--accent); color: #fff; padding: 10px 13px; text-align: center; font-weight: 600; font-size: 11px; letter-spacing: 0.3px; }
.ctable th:first-child { text-align: left; }
.ctable td { padding: 9px 13px; border-bottom: 1px solid var(--border-light); text-align: center; }
.ctable tr:last-child td { border-bottom: none; }
.ctable tr:nth-child(even) td { background: var(--surface-alt); }
.ctable td:first-child { text-align: left; color: var(--text); font-weight: 600; }
.ty { color: var(--green); font-weight: 700; }
.tn { color: var(--red); font-weight: 700; }
.tc { color: var(--amber); font-weight: 700; }

/* C: border-left 경고 박스 */
.warnbox { background: var(--amber-bg); border: 1px solid #fbbf24; border-left: 3px solid var(--amber); border-radius: var(--radius); padding: 14px 16px; }
.warnbox h4 { font-size: 12px; font-weight: 700; color: var(--amber-dark); margin-bottom: 8px; }
.warnbox ul { list-style: none; }
.warnbox li { font-size: 11px; color: var(--amber-dark); padding: 4px 0 4px 18px; position: relative; line-height: 1.7; }
.warnbox li::before { content: "⚠"; position: absolute; left: 0; font-size: 10px; }

/* 자격미달 */
.inelig-hard { background: var(--red-bg); border: 1px solid #fca5a5; border-left: 4px solid var(--red); border-radius: var(--radius); padding: 20px; margin-bottom: 16px; }
.inelig-hard h3 { font-size: 15px; font-weight: 700; color: var(--red-dark); margin-bottom: 10px; }
.inelig-hard p { font-size: 13px; color: var(--red-dark); line-height: 1.7; margin-bottom: 6px; }
.inelig-hard .alt { font-size: 12px; color: #065f46; background: #ecfdf5; border-radius: var(--radius-xs); padding: 10px 12px; margin-top: 10px; line-height: 1.6; }
.inelig-soft { background: #fef9ee; border: 1px solid #fde68a; border-left: 4px solid var(--amber); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 12px; }
.inelig-soft h4 { font-size: 13px; font-weight: 700; color: var(--amber-dark); margin-bottom: 6px; }
.inelig-soft p { font-size: 12px; color: var(--amber-dark); line-height: 1.6; }
.inelig-soft .note { font-size: 11px; color: var(--text-sub); margin-top: 6px; font-style: italic; }

/* C: 깔끔한 상담일지 */
.journal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.journal-item { background: var(--surface); border-radius: var(--radius-sm); padding: 15px; border: 1px solid var(--border); }
/* C: 액센트 컬러 라벨 */
.journal-item .ji-label { font-size: 10px; font-weight: 700; color: var(--accent); margin-bottom: 7px; text-transform: uppercase; letter-spacing: 0.5px; }
.journal-item .ji-val { font-size: 12px; color: var(--text); line-height: 1.8; white-space: pre-wrap; }
.journal-item .ji-empty { font-size: 12px; color: var(--text-dim); font-style: italic; }

/* 체크리스트 */
.checklist { list-style: none; }
.checklist li { font-size: 12px; color: var(--text-sub); padding: 7px 0 7px 22px; position: relative;
  border-bottom: 1px solid var(--border-light); line-height: 1.6; }
.checklist li:last-child { border-bottom: none; }
.checklist li::before { content: "□"; position: absolute; left: 2px; font-size: 13px; color: var(--text-dim); }
/* C: 중요 체크 → 액센트 컬러 */
.checklist li.important::before { content: "☑"; color: var(--accent); }

/* C: border-left 제도 선택 박스 + 기본의 앰버 톤 유지 */
.program-select-box { background: var(--surface); border: 1px solid var(--border); border-left: 3px solid var(--accent); border-radius: var(--radius); padding: 18px; }
.program-select-box h3 { font-size: 13px; font-weight: 800; color: var(--accent); margin-bottom: 12px; display: flex; align-items: center; gap: 7px; }
.program-select-box select { padding: 10px 14px; border: 1px solid var(--border); border-radius: var(--radius-xs); font-size: 14px; font-weight: 700; font-family: inherit; background: var(--surface); color: var(--accent); cursor: pointer; min-width: 220px; transition: all var(--transition); }
.program-select-box select:focus { outline: none; box-shadow: 0 0 0 3px rgba(30,58,95,0.08); border-color: var(--accent); }
.narrative-box { margin-top: 14px; }
.narrative-box label { font-size: 11px; font-weight: 700; color: var(--text-sub); margin-bottom: 5px; display: block; }
.narrative-box textarea { width: 100%; min-height: 200px; padding: 14px; border: 1px solid var(--border); border-radius: var(--radius-xs); font-size: 12px; font-family: inherit; line-height: 1.8; resize: vertical; background: var(--surface); }
.narrative-box textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(30,58,95,0.08); }

/* ── 저장 버튼 */
.btn-save { width: 100%; padding: 10px; background: #059669; color: white; border: none; border-radius: var(--radius-xs);
  font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit; transition: all var(--transition); }
.btn-save:hover { background: #047857; }
.btn-save:disabled { background: #9ca3af; cursor: not-allowed; }
.btn-history { width: 100%; padding: 8px; background: none; color: var(--accent); border: 1px solid var(--accent);
  border-radius: var(--radius-xs); font-size: 12px; cursor: pointer; font-family: inherit; transition: all var(--transition); }
.btn-history:hover { background: rgba(30,58,95,0.05); }

/* ── 이력 모달 */
.modal-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000; justify-content:center; align-items:center; }
.modal-overlay.active { display:flex; }
.modal { background:var(--surface); border-radius:var(--radius); width:90%; max-width:900px; max-height:85vh; display:flex; flex-direction:column; box-shadow:0 20px 60px rgba(0,0,0,0.3); }
.modal-header { padding:16px 20px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; }
.modal-header h2 { font-size:16px; font-weight:800; color:var(--accent); }
.modal-close { background:none; border:none; font-size:20px; cursor:pointer; color:var(--text-dim); padding:4px 8px; }
.modal-body { overflow-y:auto; padding:16px 20px; flex:1; }
.modal-search { display:flex; gap:8px; margin-bottom:14px; }
.modal-search input { flex:1; padding:8px 12px; border:1px solid var(--border); border-radius:var(--radius-xs); font-size:13px; font-family:inherit; }
.modal-search button { padding:8px 16px; background:var(--accent); color:white; border:none; border-radius:var(--radius-xs); font-size:12px; font-weight:700; cursor:pointer; font-family:inherit; }
.history-table { width:100%; border-collapse:collapse; font-size:12px; }
.history-table th { background:var(--bg); padding:8px 10px; text-align:left; font-weight:700; color:var(--text-sub); border-bottom:2px solid var(--border); position:sticky; top:0; }
.history-table td { padding:8px 10px; border-bottom:1px solid var(--border-light); color:var(--text); }
.history-table tr:hover td { background:rgba(30,58,95,0.03); }
.history-table .td-name { font-weight:700; color:var(--accent); cursor:pointer; }
.history-table .td-name:hover { text-decoration:underline; }
.save-status { font-size:11px; text-align:center; margin-top:4px; padding:4px; border-radius:var(--radius-xs); }
.save-status.success { color:#059669; background:#ecfdf5; }
.save-status.error { color:#dc2626; background:#fef2f2; }

@media (max-width: 900px) {
  .layout { grid-template-columns: 1fr; }
  .detail-grid, .journal-grid { grid-template-columns: 1fr; }
  .cards { grid-template-columns: 1fr; }
  .modal { width: 95%; max-height: 90vh; }
}
</style>
</head>
<body>

<div class="top-bar">
  <div class="top-bar-left">
    <span>📋</span>
    <h1>채무조정 상담 도구</h1>
  </div>
  <span class="sub">전화 상담 실시간 입력용</span>
</div>

<div class="layout">

<!-- ════════ 입력 패널 ════════ -->
<div class="input-panel">

  <!-- 1. 기본 정보 -->
  <div class="ip-section">
    <div class="ip-sec-title"><span class="ico">👤</span> 신청인 기본 정보</div>

    <div class="row2">
      <div class="field">
        <label>이름</label>
        <input type="text" id="f_name" placeholder="홍길동">
      </div>
      <div class="field">
        <label>연락처</label>
        <input type="text" id="f_phone" placeholder="010-0000-0000">
      </div>
    </div>
    <div class="row2">
      <div class="field">
        <label>출생연도 <span class="tip-icon" title="만 29세 이하면 청년회생 가능 (서울회생법원 등 일부 법원만 적용), 만 60세 이상이면 파산 유리">ℹ</span></label>
        <input type="number" id="f_birth" placeholder="예: 1985" min="1930" max="2010" oninput="onBirthChange()">
        <div class="val-hint" id="h_age"></div>
      </div>
      <div class="field">
        <label>거주지</label>

<script>
// ── 상수
const LIVING = {1:1538543,1.5:2029059,2:2519575,2.5:2867498.5,3:3215422,3.5:3556132.5,4:3896843,4.5:4215437,5:4534031};
const LIVING_MIN = {1:1025695,1.5:1352706,2:1679717,2.5:1911665.5,3:2143614,3.5:2370754.5,4:2597895,4.5:3309908,5:4021921};
const LIVING_BANKRUPT = {1:1435208, 2:2359595}; // 파산 기준 생계비 (25년)

const flags = {};
['biz','young','senior','gambling','seizure','health','welfare','single_parent','divorce','tax_arrear','fraud_victim'].forEach(k => flags[k]=false);

function togB(k) {
  flags[k] = !flags[k];
  const el = document.getElementById('b_'+k);
  const warnKeys = ['gambling','seizure','fraud_victim'];
  const yellowKeys = ['young','senior','health','single_parent','divorce','tax_arrear'];
  if (!flags[k]) { el.className='badge'; }
  else if (warnKeys.includes(k)) { el.className='badge on-warn'; }
  else if (yellowKeys.includes(k)) { el.className='badge on-yellow'; }
  else { el.className='badge on'; }
  updateBadgeWarnings();
}

function updateBadgeWarnings() {
  const lines = [];
  if (flags.gambling) lines.push('⚠ 도박·코인·주식 이력 → 최근 대출 사용처 반드시 확인. 재산으로 산정될 수 있음. 파산 면책 불허가 사유 해당 가능.');
  if (flags.seizure) lines.push('⚠ 가압류 → 새출발기금 신청 전 가압류 해제 절차 필요 (약 1개월 소요).');
  if (flags.senior) lines.push('ℹ 만 60세 이상 → 소득 낮을 경우 파산이 유리할 수 있음.');
  if (flags.young) lines.push('ℹ 만 34세 이하 → 개인회생 시 청년회생(변제기간 24개월) 적용 가능. 서울회생법원·부산·수원 등 일부 법원만 적용, 지방법원은 미적용 가능.');
  if (flags.single_parent) lines.push('ℹ 한부모가정 → 양육 부담으로 변제능력 부족 소명에 유리. 파산 시 감안 사유.');
  if (flags.divorce) lines.push('ℹ 이혼 → 최근 2년 이내 이혼 시 재산분할 내역 확인 필요. 양육비는 비면책채권(파산 면책 불가).');
  if (flags.tax_arrear) lines.push('ℹ 세금 체납 → 비면책채권(파산해도 면책 불가). 개인회생 시 우선채권으로 별도 변제 필요.');
  if (flags.fraud_victim) lines.push('⚠ 사기 피해(보이스피싱·투자사기 등) → 채무 경위 소명 필요. 과실 여부에 따라 면책 판단에 영향.');
  const el = document.getElementById('h_badge_warn');
  el.innerHTML = lines.map(l => `<div style="font-size:11px;padding:2px 0;color:${l.startsWith('⚠')?'#c05621':'#2b6cb0'}">${l}</div>`).join('');
}

function onBirthChange() {
  const yr = parseInt(document.getElementById('f_birth').value);
  if (!yr || yr < 1930 || yr > 2010) { document.getElementById('h_age').textContent=''; return; }
  const age = calcAge(yr);
  document.getElementById('h_age').textContent = `만 ${age}세 (${yr}년생)`;
  if (age <= 34 && !flags.young) { togB('young'); }
  if (age >= 60 && !flags.senior) { togB('senior'); }
}

function calcAge(yr) {
  if (typeof yr === 'number') return new Date().getFullYear() - yr;
  const y = parseInt(yr);
  return isNaN(y) ? 0 : new Date().getFullYear() - y;
}

function onLiveCalc() {
  const income = +document.getElementById('f_income').value||0;
  const total = +document.getElementById('f_total_debt').value||0;
  const recent = +document.getElementById('f_recent_debt').value||0;
  const assets = +document.getElementById('f_assets').value||0;

  document.getElementById('h_income').textContent = income > 0 ? '= '+fmtW(income) : '';
  document.getElementById('h_total_debt').textContent = total > 0 ? '= '+fmtW(total) : '';
  document.getElementById('h_assets').textContent = assets > 0 ? '= '+fmtW(assets) : '';

  // 배우자 소득 힌트
  const spEl = document.getElementById('h_sp_income');
  const sp = +document.getElementById('f_sp_income').value||0;
  if (sp > 0 && sp > income) {
    spEl.textContent = '배우자 소득이 더 높음 → 가구원수에서 배우자 제외 적용';
    spEl.className = 'warn-hint';
  } else if (sp > 0) {
    spEl.textContent = '참고자료 (소득 미합산, 가구원수 유지)';
    spEl.className = 'sub-hint';
  } else {
    spEl.textContent = '';
    spEl.className = 'sub-hint';
  }

  if (recent > 0 && total > 0) {
    const r = recent/total;
    const el = document.getElementById('h_recent_debt');
    el.textContent = fmtW(recent) + ' = 전체의 ' + pct(r);
    el.className = r > 0.3 ? 'warn-hint' : 'val-hint';
  } else {
    document.getElementById('h_recent_debt').textContent = '';
    document.getElementById('h_recent_debt').className = 'sub-hint';
  }

  // 기존 이력 재신청 불가 경고
  const prev = document.getElementById('f_prev_proc').value;
  const prevDate = document.getElementById('f_prev_date').value;
  const wEl = document.getElementById('h_prev_warning');
  if ((prev==='reho'||prev==='bankrupt') && prevDate) {
    const yr = parseInt(prevDate); const now = new Date().getFullYear();
    if (!isNaN(yr)) {
      const limit = prev==='reho' ? 5 : 7;
      const elapsed = now - yr;
      if (elapsed < limit) {
        wEl.style.display='block';
        wEl.textContent = `⚠ ${prev==='reho'?'개인회생':'파산'} 면책 후 ${elapsed}년 경과. ${limit}년 제한 → 재신청 불가 (${yr+limit}년부터 가능)`;
      } else {
        wEl.style.display='none';
      }
    }
  } else { wEl.style.display='none'; }

  // 세금·4대보험 체납 → 자동 뱃지
  const taxVal = +document.getElementById('f_tax').value||0;
  if (taxVal > 0 && !flags.tax_arrear) { togB('tax_arrear'); }
  else if (taxVal === 0 && flags.tax_arrear) { togB('tax_arrear'); }
}

document.getElementById('f_prev_proc').addEventListener('change', onLiveCalc);

// ── 포맷 유틸
function fmtW(v) {
  if (v >= 100000000) return (v/100000000).toFixed(2)+'억원';
  if (v >= 10000) return Math.round(v/10000).toLocaleString()+'만원';
  return v.toLocaleString()+'원';
}
function fmtN(v) { return Math.round(v).toLocaleString(); }
function pct(v) { return (v*100).toFixed(1)+'%'; }
function gv(id) { return document.getElementById(id).value; }
function gn(id) { return parseFloat(document.getElementById(id).value)||0; }

// ── 메인 계산
function doCalc() {
  const totalDebt = gn('f_total_debt');
  const _taxCheck = gn('f_tax');
  // 총채무 0이지만 세금 입력 있으면 통과 (자격미달 판단용)
  if (!totalDebt && !_taxCheck) { alert('총 채무액을 입력해 주세요.'); return; }

  const income      = gn('f_income');
  const spIncome    = gn('f_sp_income');
  const assets      = gn('f_assets');
  const recentDebt  = gn('f_recent_debt');
  const nonPartner  = gn('f_non_partner');
  const secured     = gn('f_secured');
  const personal    = gn('f_personal');
  const tax         = gn('f_tax');
  const household   = parseFloat(gv('f_household'));
  const overdue     = parseInt(gv('f_overdue'));
  const birth       = gv('f_birth');
  const age         = birth ? calcAge(birth) : null;
  const prevProc    = gv('f_prev_proc');

  // 배우자 소득은 합산하지 않음 - 부양가족 산정에만 영향
  // 배우자 소득 > 본인 소득이면 배우자가 가족 부양 주체 → 가구원수에서 배우자(-0.5) 제외
  const spIncomeBigger = spIncome > 0 && spIncome > income;
  const adjustedHousehold = (spIncome > 0 && spIncomeBigger)
    ? Math.max(1, household - 0.5)
    : household;
  const totalIncome = income; // 배우자 소득 미합산
  const living      = LIVING[adjustedHousehold]  || LIVING[1];
  const livingMin   = LIVING_MIN[adjustedHousehold] || LIVING_MIN[1];
  const livingBankrupt = LIVING_BANKRUPT[1]; // 파산 기준 (1인)
  const recentRatio = totalDebt > 0 ? recentDebt / totalDebt : 0;
  const unsecuredDebt = totalDebt - secured; // 담보 제외 무담보채무 (회생·새출발·신복위 대상)
  const partnerDebt = unsecuredDebt - nonPartner; // 협약기관 채무 (새출발기금 대상)

  // ── 개인회생 계산 (담보채무는 별도 상환 → 무담보채무 기준)
  const disposable    = totalIncome - living;
  const repayIncome   = Math.max(0, disposable * 36);
  const repayAsset    = assets;
  const rehoExpected  = Math.max(repayIncome, repayAsset);
  const rehoMonthly   = disposable > 0 ? rehoExpected / 36 : 0;
  const rehoReduce    = unsecuredDebt > 0 ? (unsecuredDebt - rehoExpected) / unsecuredDebt : 0;
  const youngMonths   = (age !== null && age <= 34) ? 24 : null;

  // ── 새출발기금 계산 (항상 부실차주 기준: 90일 연체 후 신청 전제)
  // 실무상 90일 연체 후 부실차주로 신청 안내 → 원금 탕감 적용 기준으로 계산
  // 담보채무 제외, 협약기관 무담보채무만 대상
  const isBadDebtor = overdue >= 90;
  const saefundBurden  = partnerDebt - (partnerDebt - assets) * 0.8; // 항상 부실차주 기준
  const saefundPeriod  = 120; // 부실차주: 최장 120개월
  const saefundMonthly = Math.max(0, saefundBurden) / saefundPeriod;
  const saefundReduce  = partnerDebt > 0 ? (partnerDebt - Math.max(0, saefundBurden)) / partnerDebt : 0;

  // ── 신용회복위원회 (원금 탕감 없음, 이자 감면 + 장기 분할상환)
  // 신속채무조정(30일↓): 이자 30~50% 인하, 최장 10년
  // 프리워크아웃(31~89일): 이자 50% 인하, 최장 10년
  // 담보채무 제외 무담보채무 기준
  const shinReduce  = 0; // 원금 감면 없음
  const shinBurden  = unsecuredDebt; // 무담보채무 원금 상환
  const shinPeriod  = 120; // 최장 10년(120개월)
  const shinMonthly = shinBurden / shinPeriod;

  // ── 파산 판단
  // 소득 기준: 가용소득이 최저생계비 미만 또는 소득이 파산 기준 미만
  // 상황 기준: 건강문제, 기초수급, 한부모가정, 고령(65세↑) → 변제능력 부족 소명 용이
  const canBankrupt = disposable < 150000 || income < livingBankrupt || flags.health || flags.welfare || flags.single_parent || (flags.senior && age >= 65);

  // ── 경고 목록
  const warnings = [];
  if (recentRatio > 0.3) warnings.push(`최근 6개월 내 신규채무 비율 ${pct(recentRatio)}로 30% 초과 → 새출발기금은 해당 채무 제외 후 진행, 개인회생은 면책 불허가 사유 검토 필요.`);
  if (flags.gambling) warnings.push('도박·코인·주식 이력 → 최근 대출 사용처 파악 필수. 재산(청산가치)으로 반영될 수 있음. 파산 면책 불허가 해당 가능.');
  if (flags.seizure) warnings.push('가압류 있음 → 새출발기금 신청 전 가압류 해제 필요: 한달치 납부(실효방지) → 방문 → 유예신청(6개월) → 채권수정신고. 약 1개월 소요.');
  if (prevProc === 'reho') warnings.push('기존 개인회생 면책 후 5년 이내 재신청 불가. 면책 시점 확인 필수.');
  if (prevProc === 'bankrupt') warnings.push('기존 파산 면책 후 7년 이내 재신청 불가. 면책 시점 확인 필수.');
  if (assets >= 650000000) warnings.push('재산 6억5천만원 이상 → 새출발기금 부실차주 신청 불가.');
  if (tax > 0 || flags.tax_arrear) warnings.push(`세금·4대보험 체납${tax > 0 ? ' ' + fmtW(tax) : ''} → 비면책채권(파산해도 면책 불가). 회생 시 우선채권으로 별도 변제 필요. 새출발기금 대상 외.`);
  if (personal > 0) warnings.push(`개인채무 ${fmtW(personal)} 확인됨 → 채권자 인적사항·차용 내역 파악 필수. 정보 불충분 시 법원이 채권 미인정 가능. 미리 고지 필요.`);
  if (flags.divorce) warnings.push('이혼 → 최근 2년 이내 이혼 시 재산분할 내역 확인 필요. 양육비는 비면책채권(파산 면책 불가), 개인회생 시 별도 고려.');
  if (flags.fraud_victim) warnings.push('사기 피해(보이스피싱·투자사기 등) → 채무 경위 소명 시 과실 판단에 유리. 면책 불허가 사유 해당 여부 검토.');

    // ── 옵션 생성 및 점수
  const options = [];

  // 개인회생
  {
    const ok = disposable > 0 && prevProc !== 'reho' && prevProc !== 'bankrupt';
    const cautions = [];
    if (flags.gambling) cautions.push('도박·과소비 이력 → 재산 반영 가능');
    if (recentRatio > 0.3) cautions.push(`6개월 내 채무 ${pct(recentRatio)} → 면책 불허가 검토`);
    if (!ok && disposable <= 0) cautions.push('가용자금이 음수 (생계비 부족) → 파산 검토');
    let score = 0;
    const taxRatio = totalDebt > 0 ? tax / totalDebt : 0;
    if (ok) {
      // 감면율 구간별 가산 (세분화)
      if (rehoReduce > 0.9) score += 35;
      else if (rehoReduce > 0.7) score += 30;
      else if (rehoReduce > 0.5) score += 20;
      else if (rehoReduce > 0.3) score += 15;
      if (rehoMonthly < income * 0.3) score += 20;
      else if (rehoMonthly < income * 0.5) score += 10;
      if (youngMonths) score += 10;
      if (overdue < 90) score += 10;
      // 개인채무(비금융) 포함 시 → 개인회생만 처리 가능
      if (personal > 0) score += 10;
      // 안정적 가용소득 → 회생 적합도 상승
      if (disposable >= 500000) score += 10;
      score += 20; // 기본 가용
      // 비면책채권(세금) 비율 → 회생해도 세금은 별도 납부
      if (taxRatio > 0.3) { score -= 10; cautions.push(`비면책채권(세금) ${pct(taxRatio)} → 회생 변제금 외 세금 ${fmtW(tax)} 별도 납부`); }
      else if (taxRatio > 0.1) { score -= 5; cautions.push(`비면책채권(세금) ${pct(taxRatio)} → 세금 ${fmtW(tax)} 별도 납부 필요`); }
      // 월변제액 > 소득: 청산가치가 너무 높아 현실적으로 변제 불가
      if (rehoMonthly > income && income > 0) { score -= 40; cautions.push(`월 변제액 ${fmtN(rehoMonthly)}원 > 월소득 ${fmtN(income)}원 → 청산가치 과다, 회생 사실상 불가`); }
      else if (rehoMonthly > income * 0.7) { score -= 15; cautions.push(`월 변제액이 소득의 70% 초과 → 생활 유지 곤란`); }
      // 도박·코인 이력 + 최근채무 비중 → 회생 인가 리스크 (최근채무 어느정도는 진행 가능)
      if (flags.gambling && recentRatio > 0.5) { score -= 15; cautions.push(`도박·코인 이력 + 최근채무 ${pct(recentRatio)} → 낭비행위로 회생 인가 기각 위험, 법원 소명 필요 ★★`); }
      else if (flags.gambling && recentRatio > 0.3) { cautions.push(`도박·코인 이력 + 최근채무 ${pct(recentRatio)} → 법원 소명 필요`); }
      else if (flags.gambling) { cautions.push('도박·코인 이력 → 재산 산입 가능, 법원 소명 필요'); }
      // 가용소득 소액 양수 → 법원 인가 가능성 낮음
      if (disposable > 0 && disposable < 150000) { score -= 15; cautions.push(`가용소득 월 ${fmtN(disposable)}원 → 법원 인가 가능성 낮음, 파산 검토`); }
    }
    options.push({ id:'reho', name:'개인회생', score, ok, cautions,
      stats:[
        ['가용자금(월)', fmtN(disposable)+'원', disposable>=0?'g':'r'],
        ['예상 변제금', fmtW(rehoExpected), 'b'],
        ['월 변제액', fmtN(rehoMonthly)+'원', ''],
        ['예상 감면율', pct(rehoReduce), 'g'],
        ['변제기간', youngMonths ? `24개월(청년)/36개월` : '36개월', ''],
      ],
      desc: `소득 기반 변제(무담보채무 ${fmtW(unsecuredDebt)} 기준). 가용자금(월 변제금) ${fmtW(Math.abs(disposable))}${disposable<0?'(생계비 부족)':''}.${secured>0?' 담보채무 '+fmtW(secured)+' 별도 상환.':''}${youngMonths?' 청년회생 적용 가능(만 34세 이하).':''}`
    });
  }

  // 새출발기금 (90일 연체 후 부실차주 신청 전제)
  {
    const ok = totalDebt <= 1500000000 && assets < 650000000
      && prevProc !== 'reho' && prevProc !== 'bankrupt';
    const cautions = [];
    if (recentRatio > 0.3) cautions.push(`6개월 내 채무 ${pct(recentRatio)} 초과 → 해당 채무 제외 후 진행`);
    if (nonPartner > 0) cautions.push(`협약 외 채무 ${fmtW(nonPartner)} 별도 처리`);
    if (!flags.biz) cautions.push('자영업자·소상공인 자격 확인 필요');
    // 90일 미만 → 연체 대기 안내
    if (!isBadDebtor) {
      const daysToWait = Math.max(0, 90 - (overdue||0));
      cautions.push(`💡 현재 연체 ${overdue||0}일 → ${daysToWait}일 추가 대기 후 부실차주로 신청 시 원금 최대 60~90% 감면`);
    }
    let score = 0;
    if (ok) {
      // 부실차주 기준 감면율 가점 (항상 90일+ 전제)
      if (saefundReduce > 0.6) score += 25;
      if (income === 0) score += 5;
      else if (saefundMonthly < income * 0.3) score += 10;
      score += 15; // 부실차주 전제 가점
      score += 10; // 기본
      // 개인회생 대비 우위 비교: 총변제액 또는 월변제액이 유리하면 가점
      if (rehoExpected > 0 && Math.max(0,saefundBurden) < rehoExpected) {
        score += 15; // 총변제액 유리
        if (saefundMonthly < rehoMonthly * 0.5) score += 10; // 월부담 절반 이하
      }
      // 소득 있고 회생 가능하지만 새출발이 총변제액도 적으면 감점 축소
      if (disposable > 150000 && Math.max(0,saefundBurden) >= rehoExpected) score -= 10;
      else if (disposable > 150000) score -= 3; // 회생 가능하지만 새출발이 유리 → 소폭만 감점
      // 아직 연체 90일 미달 → 대기 불확실성 소폭 감점
      if (!isBadDebtor) score -= 5;
      // 고령자 장기상환
      if (age !== null && age >= 65) {
        const affordable = income > 0 && saefundMonthly < income * 0.3;
        if (age >= 70) score -= affordable ? 5 : 20;
        else score -= affordable ? 0 : 10;
      }
      if (totalDebt > 0 && nonPartner / totalDebt > 0.5) score -= 10;
      if (income > 0) {
        const dtiMonths = totalDebt / income;
        if (dtiMonths > 600) score -= 20;
        else if (dtiMonths > 300) score -= 10;
      }
    }
    const saefundDescText = isBadDebtor
      ? `부실차주(90일↑ 연체): 원금 감면 적용. 소득 요건 없음. 최장 120개월 분할상환.`
      : `90일 연체 후 부실차주로 신청 권장. 현재 연체 ${overdue||0}일. 부실차주 전환 시 원금 60~90% 감면, 최장 120개월.`;
    options.push({ id:'saefund', name:'새출발기금', score, ok, cautions,
      stats:[
        ['협약기관 채무', fmtW(partnerDebt), 'b'],
        ['채무 부담액(부실차주)', fmtW(Math.max(0,saefundBurden)), 'b'],
        ['예상 감면율', pct(saefundReduce), 'g'],
        ['월 상환액', fmtN(saefundMonthly)+'원', ''],
        ['상환기간', '최장 120개월', ''],
      ],
      desc: saefundDescText
    });
  }

  // 신용회복위원회 (신속채무조정 / 프리워크아웃 / 개인워크아웃)
  {
    const isWorkout = overdue >= 90; // 개인워크아웃 (90일↑)
    const ok = totalDebt <= 1500000000; // 모든 연체 구간 대응 가능
    const cautions = [];
    if (overdue >= 60 && overdue < 90) cautions.push('연체 3개월 접근 → 새출발기금 동시 검토');
    if (isWorkout) cautions.push('개인워크아웃 → 원금 최대 30~70% 감면, 이자 전액 감면 가능');
    let score = 0;
    if (ok) {
      if (totalDebt < 50000000) score += 25;
      else if (totalDebt < 100000000) score += 15;
      if (overdue <= 31) score += 20;
      else if (overdue < 90) score += 10;
      // 소득 안정성 가산
      if (income > living) score += 10;
      // 소액채무 추가 가산
      if (totalDebt < 10000000) score += 10;
      // 재산 ≥ 채무: 파산·회생·새출발 모두 불리 → 신복위가 현실적 대안
      if (assets >= totalDebt && totalDebt > 0) score += 30;
      // 고액채무 + 원금감면 없는 경우(신속/프리워크아웃) → 실질 효과 미미
      if (!isWorkout && totalDebt > 50000000) score -= 15;
      // 90일↑ 연체 시 새출발기금이 감면율에서 거의 항상 유리 → 신복위 감점
      if (isWorkout && saefundReduce > 0.3) score -= 15;
      // 원금감면 없는 신속/프리워크아웃은 새출발기금 대기가 유리한 경우 추가 감점
      if (!isWorkout && overdue >= 60 && saefundReduce > 0.5) score -= 10;
    }
    const shinDesc = overdue <= 31
      ? '신속채무조정: 원금 감면 없음. 이자 인하 + 최장 10년 분할상환.'
      : overdue < 90
        ? '프리워크아웃: 원금 감면 없음. 이자 인하 + 최장 10년 분할상환.'
        : '개인워크아웃: 원금 감면 가능(30~70%). 이자 전액 감면 + 최장 10년 분할상환.';
    options.push({ id:'shin', name:'신용회복위원회', score, ok, cautions,
      stats:[
        ['상환 원금', isWorkout ? '원금 감면 가능' : fmtW(shinBurden), isWorkout ? 'g' : 'b'],
        ['이자 감면', overdue <= 31 ? '약정이자 30~50% 인하' : overdue < 90 ? '약정이자 50% 인하' : '이자 전액 감면 가능', 'g'],
        ['월 상환액', fmtN(shinMonthly)+'원', ''],
        ['상환기간', `최장 ${shinPeriod}개월`, ''],
      ],
      desc: shinDesc
    });
  }

  // 개인파산
  {
    const ok = prevProc !== 'bankrupt' && prevProc !== 'reho';
    const cautions = [];
    if (flags.gambling) cautions.push('도박 이력 → 면책 불허가 위험 ★★★');
    if (!canBankrupt) cautions.push('소득이 생계비 이상 → 회생 우선 검토');
    if (assets > 0) cautions.push(`재산 ${fmtW(assets)} → 환가 후 변제 필요`);
    const bankruptTaxRatio = totalDebt > 0 ? tax / totalDebt : 0;
    let score = 0;
    if (ok && canBankrupt) {
      // 가용소득 구간별 차등 (소액 양수 구간 보정)
      if (disposable < 0) score += 45;
      else if (disposable < 50000) score += 35;
      else if (disposable < 100000) score += 25;
      else if (disposable < 150000) score += 15;
      if (totalDebt > 300000000) score += 15;
      // 취약사유 개별 가산 (누적 가능, 최대 +40)
      let vulnScore = 0;
      if (flags.senior && age >= 65) vulnScore += 10;
      if (flags.health) vulnScore += 15;
      if (flags.welfare) vulnScore += 15;
      if (flags.single_parent) vulnScore += 10;
      score += Math.min(vulnScore, 40);
      // 도박 이력 → 면책불허가 위험 감점
      if (flags.gambling) score -= 20;
      score += 10;
      // 사적조정 가능 시 파산 감점 (사적조정 우선 원칙)
      // 연체 90일 미만 + 소득 있음 → 신복위/새출발기금 우선
      if (overdue < 90 && income > 0) score -= 15;
      // 소득 있고 90일 이상 → 새출발/회생 우선 약간 감점
      else if (income > 0 && overdue >= 90) score -= 5;
      // 비면책채권(세금) 비율 → 파산해도 세금은 면책 불가
      if (bankruptTaxRatio > 0.5) { score -= 25; cautions.push(`비면책채권(세금) ${pct(bankruptTaxRatio)} → 파산해도 세금 ${fmtW(tax)} 면책 불가`); }
      else if (bankruptTaxRatio > 0.3) { score -= 15; cautions.push(`비면책채권(세금) ${pct(bankruptTaxRatio)} → 파산해도 세금 ${fmtW(tax)} 면책 불가`); }
      else if (bankruptTaxRatio > 0.1) { score -= 5; cautions.push(`세금 체납 ${fmtW(tax)} → 파산 면책 대상 아님`); }
    }
    options.push({ id:'bankrupt', name:'개인파산·면책', score, ok, cautions,
      stats:[
        ['면책 후 채무', '0원 (면책시)', 'g'],
        ['소득 대 생계비', disposable<0?'생계비 부족':'생계비 초과', disposable<0?'g':'r'],
        ['환가 재산', fmtW(assets), ''],
        ['소요 기간', '약 6~12개월', ''],
      ],
      desc: `소득으로 변제 불가 시. 면책 허가 시 채무 전액 소멸.${flags.senior?' 고령자 유리.':''}${flags.health?' 건강 사유 유리.':''}${flags.tax_arrear?' 단, 세금은 비면책.':''}${flags.divorce?' 양육비 비면책.':''}`
    });
  }

  // ── 100점 정규화 + Tier 보너스
  const MAX_RAW = { reho: 105, saefund: 100, shin: 75, bankrupt: 110 };
  const TIER_BONUS = { shin: 8, saefund: 8, reho: 4, bankrupt: 0 };
  options.forEach(o => {
    const maxRaw = MAX_RAW[o.id] || 100;
    const normalized = Math.round(Math.max(0, o.score) / maxRaw * 100);
    o.score = Math.min(100, normalized + (o.ok ? TIER_BONUS[o.id] || 0 : 0));
    o.stats.push(['추천 점수', o.score + '/100점', o.score >= 60 ? 'g' : o.score >= 30 ? '' : 'r']);
  });

  // 정렬: ok인 것 앞에, 점수순
  options.sort((a,b) => {
    if (a.ok !== b.ok) return a.ok ? -1 : 1;
    return b.score - a.score;
  });

  // ── 자격미달 판단
  const ineligibility = [];
  // Hard: 채무 없음
  if (totalDebt === 0) {
    ineligibility.push({ severity:'hard', title:'채무 없음',
      msg:'채무가 없으므로 채무조정 대상이 아닙니다.',
      alt:'가계부채 상담이 필요하시면 금융감독원 1332로 문의하세요.' });
  }
  // Hard: 채무 전액 세금
  if (tax > 0 && tax >= totalDebt && totalDebt > 0) {
    ineligibility.push({ severity:'hard', title:'채무 전액 비면책채권(세금)',
      msg:`총채무 ${fmtW(totalDebt)} 전액이 조세채무입니다. 파산해도 면책 불가(채무자회생법 제566조), 새출발기금·신복위는 금융채무만 대상이므로 모든 채무조정 프로그램의 실질적 효과가 없습니다.`,
      alt:'관할 세무서에 분할납부 또는 체납처분유예를 신청하시기 바랍니다. 국세: 국세청 126 / 지방세: 관할 구청 세무과' });
  }
  // Soft: 재산 > 채무
  if (assets > totalDebt && totalDebt > 0) {
    ineligibility.push({ severity:'soft', title:'재산이 채무보다 많음',
      msg:`보유 재산(${fmtW(assets)})이 총채무(${fmtW(totalDebt)})를 초과하여 지급불능으로 보기 어렵습니다. 재산 처분을 통한 상환을 검토해 보세요.`,
      note:'※ 주거용 부동산·압류 재산 등 특수 사정이 있는 경우 전문가 상담 필요. 신용회복위원회를 통한 이자 감면·분할상환은 재산과 무관하게 진행 가능합니다.' });
  }
  // Soft: 소액 채무
  if (totalDebt > 0 && totalDebt < 1000000) {
    ineligibility.push({ severity:'soft', title:'소액 채무 (절차 실익 부족)',
      msg:`채무 ${fmtW(totalDebt)}은 채무조정 절차 비용(인지대·송달료·대리인비용) 대비 실익이 거의 없습니다. 채권자와 직접 분할상환 협의를 권장합니다.`,
      note:'※ 기초생활수급자 등 긴급한 경우 긴급복지 지원(129) 연계가 가능합니다.' });
  }
  // Soft: 자력 상환 가능
  if (disposable > 0 && totalDebt > 0 && disposable * 24 >= totalDebt) {
    const months = Math.ceil(totalDebt / disposable);
    ineligibility.push({ severity:'soft', title:'단기 자력 상환 가능',
      msg:`현재 월 가용소득(${fmtN(disposable)}원)으로 약 ${months}개월 내 전액 상환이 가능합니다. 채무조정 절차 없이 자력 상환이 더 유리할 수 있습니다.`,
      note:'※ 소득 변동·실직 가능성이 있는 경우 전문가 상담을 받으시기 바랍니다.' });
  }
  // Soft: 세금 비율 80% 이상
  if (tax > 0 && totalDebt > 0 && tax / totalDebt >= 0.8 && tax < totalDebt) {
    ineligibility.push({ severity:'soft', title:'세금 비율 과다 (80% 이상)',
      msg:`채무의 ${pct(tax/totalDebt)}가 조세채무(${fmtW(tax)})로, 채무조정 프로그램의 실질적 감면 효과가 매우 제한적입니다. 세무서 납부유예를 우선 검토하세요.`,
      note:'※ 나머지 금융채무 ' + fmtW(totalDebt - tax) + '에 대해서는 채무조정 효과가 있을 수 있습니다.' });
  }

  // ── 렌더
  renderResult({
    options, warnings, ineligibility,
    totalDebt, income, spIncome, totalIncome, spIncomeBigger, assets, recentDebt, recentRatio,
    nonPartner, secured, personal, tax, household, adjustedHousehold, living, livingMin,
    overdue, age, youngMonths, prevProc,
    disposable, repayIncome, repayAsset, rehoExpected, rehoMonthly, rehoReduce,
    partnerDebt, saefundBurden, saefundMonthly, saefundReduce, saefundPeriod, isBadDebtor,
    shinBurden, shinMonthly, shinReduce, shinPeriod,
    flags: {...flags},
    // 상담일지 값
    journal: {
      name: gv('f_name'), phone: gv('f_phone'), birth: gv('f_birth'), region: gv('f_region'),
      source: gv('f_source'), family: gv('f_family'),
      income_type: gv('f_income_type'), income_detail: gv('f_income_detail'),
      assets_detail: gv('f_assets_detail'), inheritance: gv('f_inheritance'), memo: gv('f_memo'),
    }
  });
}

function renderResult(d) {
  lastCalcData = d;
  document.getElementById('btn-export').style.display = '';
  showSaveBtn();
  const panel = document.getElementById('result-panel');
  const rankLabel = ['🥇 최우선 추천','🥈 차선 고려','🥉 추가 검토'];

  // ─ 자격미달 렌더
  const hardList = (d.ineligibility || []).filter(x => x.severity === 'hard');
  const softList = (d.ineligibility || []).filter(x => x.severity === 'soft');

  let ineligHtml = '';
  hardList.forEach(h => {
    ineligHtml += `<div class="inelig-hard">
      <h3>🚫 자격 미달: ${h.title}</h3>
      <p>${h.msg}</p>
      <div class="alt">💡 대안: ${h.alt}</div>
    </div>`;
  });
  softList.forEach(s => {
    ineligHtml += `<div class="inelig-soft">
      <h4>⚠ 주의: ${s.title}</h4>
      <p>${s.msg}</p>
      ${s.note ? `<p class="note">${s.note}</p>` : ''}
    </div>`;
  });

  // Hard 자격미달이면 프로그램 추천 차단
  if (hardList.length > 0) {
    panel.innerHTML = ineligHtml;
    panel.scrollTop = 0;
    return;
  }

  // ─ 추천 카드
  let cardsHtml = '';
  d.options.forEach((opt, i) => {
    const eligible = opt.ok && opt.score > 0;
    const cls = !eligible ? 'ineligible' : i===0 ? 'rank1' : i===1 ? 'rank2' : i===2 ? 'rank3' : '';
    const ribbon = i < 3 && eligible ? `<div class="card-ribbon">${rankLabel[i]}</div>` : '';
    const statsHtml = opt.stats.map(([k,v,c]) =>
      `<div class="kv"><span class="k">${k}</span><span class="v ${c}">${v}</span></div>`
    ).join('');
    const cautionHtml = opt.cautions.length ?
      `<div class="card-caution">⚠ ${opt.cautions.join('<br>⚠ ')}</div>` : '';
    const ineligibleNote = !eligible ? `<div style="font-size:11px;color:#e53e3e;margin-top:4px;">✗ 신청 불가</div>` : '';

    cardsHtml += `<div class="card ${cls}">${ribbon}
      <div class="card-name">${opt.name}</div>
      ${statsHtml}
      <div class="card-desc">${opt.desc}</div>
      ${cautionHtml}${ineligibleNote}
    </div>`;
  });

  // ─ 경고 박스
  const warnHtml = d.warnings.length ? `
    <div class="warnbox">
      <h4>⚠ 상담 시 주의사항</h4>
      <ul>${d.warnings.map(w=>`<li>${w}</li>`).join('')}</ul>
    </div>` : '';

  // ─ 비교표
  const ro = d.options.find(o=>o.id==='reho');
  const so = d.options.find(o=>o.id==='saefund');
  const sho = d.options.find(o=>o.id==='shin');
  const bo = d.options.find(o=>o.id==='bankrupt');
  const compareHtml = `
    <table class="ctable">
      <tr><th>항목</th><th>개인회생</th><th>새출발기금</th><th>신용회복</th><th>파산·면책</th></tr>
      <tr><td>신청 적격</td>
        <td class="${ro?.ok?'ty':'tn'}">${ro?.ok?'✓ 가능':'✗ 불가'}</td>
        <td class="${so?.ok?'ty':'tn'}">${so?.ok?'✓ 가능':'✗ 불가'}</td>
        <td class="${sho?.ok?'ty':'tn'}">${sho?.ok?'✓ 가능':'✗ 불가'}</td>
        <td class="${bo?.ok?'ty':'tn'}">${bo?.ok?'✓ 가능':'✗ 불가'}</td>
      </tr>
      <tr><td>감면 내용</td>
        <td>원금 ${pct(d.rehoReduce)} 감면</td>
        <td class="ty">${d.isBadDebtor ? '원금 ' + pct(d.saefundReduce) + ' 감면' : '이자·연체료 감면'}</td>
        <td>이자 감면 (원금 감면 없음)</td>
        <td class="ty">100% (면책시)</td>
      </tr>
      <tr><td>월 부담액</td>
        <td>${d.rehoMonthly>0?fmtN(d.rehoMonthly)+'원':'-'}</td>
        <td>${fmtN(d.saefundMonthly)}원</td>
        <td>${fmtN(d.shinMonthly)}원</td>
        <td>0원</td>
      </tr>
      <tr><td>상환 기간</td>
        <td>${d.youngMonths?`24개월(청년)/`:''}36개월</td>
        <td>${d.saefundPeriod}개월</td>
        <td>최장 ${d.shinPeriod}개월</td>
        <td>해당없음</td>
      </tr>
      <tr><td>소득 요건</td>
        <td class="tc">△ 가용자금 필요</td>
        <td class="ty">✓ 불필요</td>
        <td class="tc">△ 상환능력 필요</td>
        <td class="tn">✗ 생계비 이하</td>
      </tr>
      <tr><td>연체 요건</td>
        <td>무관</td><td>31일 이상</td><td>31일 이내 권장</td><td>무관</td>
      </tr>
    </table>`;

  // ─ 상세 계산
  const detailHtml = `
    <div class="detail-grid">
      <div class="sbox">
        <h3>📌 개인회생 상세</h3>
        <div class="drow"><span class="dl">신청인 소득</span><span class="dv">${fmtN(d.totalIncome)}원/월</span></div>
        ${d.spIncome > 0 ? `<div class="drow" style="color:#718096"><span class="dl">배우자 소득 (참고)</span><span class="dv">${fmtN(d.spIncome)}원/월${d.spIncome > d.income ? ' ※배우자 부양 주체' : ''}</span></div>` : ''}
        <div class="drow"><span class="dl">생계비 (${d.adjustedHousehold}인 기준${d.adjustedHousehold !== d.household ? ' ※배우자 제외' : ''})</span><span class="dv">${fmtN(d.living)}원</span></div>
        <div class="drow dtotal"><span class="dl">가용자금 (월 변제금)</span><span class="dv" style="color:${d.disposable>=0?'#38a169':'#e53e3e'}">${fmtN(d.disposable)}원</span></div>
        <div class="drow"><span class="dl">소득기준 변제금 (×36)</span><span class="dv">${fmtN(d.repayIncome)}원</span></div>
        <div class="drow"><span class="dl">재산기준 변제금</span><span class="dv">${fmtN(d.repayAsset)}원</span></div>
        <div class="drow dtotal"><span class="dl">최종 예상 변제금</span><span class="dv" style="color:#3182ce">${fmtW(d.rehoExpected)}</span></div>
        <div class="drow"><span class="dl">월 변제액 (÷36)</span><span class="dv">${fmtN(d.rehoMonthly)}원</span></div>
        <div class="drow"><span class="dl">예상 감면율</span><span class="dv" style="color:#38a169">${pct(d.rehoReduce)}</span></div>
        ${d.youngMonths ? `<div class="drow" style="margin-top:6px;padding-top:6px;border-top:1px dashed #bee3f8;"><span class="dl" style="color:#2b6cb0">✨ 청년회생 변제기간</span><span class="dv" style="color:#2b6cb0">24개월</span></div>` : ''}
      </div>
      <div class="sbox">
        <h3>📌 새출발기금 상세</h3>
        <div class="drow"><span class="dl">총 채무액</span><span class="dv">${fmtW(d.totalDebt)}</span></div>
        <div class="drow"><span class="dl">협약기관 외 채무</span><span class="dv">${fmtW(d.nonPartner)}</span></div>
        <div class="drow dtotal"><span class="dl">협약기관 채무 (신청대상)</span><span class="dv">${fmtW(d.partnerDebt)}</span></div>
        <div class="drow" style="font-size:11px;color:#718096"><span class="dl">${d.isBadDebtor ? '공식: 채무-(채무-재산)×80%' : '부실우려: 원금 감면 없음, 이자·연체료 감면'}</span></div>
        <div class="drow dtotal"><span class="dl">채무 부담액</span><span class="dv" style="color:#3182ce">${fmtW(Math.max(0,d.saefundBurden))}</span></div>
        <div class="drow"><span class="dl">${d.isBadDebtor ? '예상 감면율' : '이자 감면(약)'}</span><span class="dv" style="color:#38a169">${pct(d.saefundReduce)}</span></div>
        <div class="drow"><span class="dl">월 상환액 (÷${d.saefundPeriod})</span><span class="dv">${fmtN(d.saefundMonthly)}원</span></div>
        <div class="drow"><span class="dl">6개월 내 채무 비율</span><span class="dv" style="color:${d.recentRatio>0.3?'#e53e3e':'#38a169'}">${pct(d.recentRatio)} ${d.recentRatio>0.3?'(30% 초과)':'(30% 이하 ✓)'}</span></div>
      </div>
    </div>`;

  // ─ 상담일지 요약
  const j = d.journal;

// ── 마지막 계산 결과 보관 (엑셀 내보내기용)
let lastCalcData = null;

// ── 제도 선택 시 상담내용/SOLUSION/판정의견 자동 생성
function onProgramSelect() {
  if (!lastCalcData) return;
  const sel = document.getElementById('sel_program').value;
  const txtNarr = document.getElementById('txt_narrative');
  const txtEval = document.getElementById('txt_evaluation');
  if (!sel) {
    txtNarr.value = '';
    txtEval.value = '';
    return;
  }

  // 먼저 템플릿으로 채우기 (즉시 표시)
  const templateNote = generateNarrative(lastCalcData, sel);
  const templateEval = generateEvaluation(lastCalcData, sel);
  txtNarr.value = templateNote;
  txtEval.value = templateEval;

  // AI 생성 요청 (백그라운드)
  const j = lastCalcData.journal || {};
  const d = lastCalcData;
  const payload = {
    action: 'generateReport',
    program: sel,
    name: j.name || '',
    birthYear: j.birth_year || '',
    household: j.household || d.adjustedHousehold || 1,
    family: j.family || '',
    income: d.income || 0,
    incomeType: j.income_type || '',
    spouseIncome: j.spouse_income || 0,
    totalDebt: d.totalDebt || 0,
    securedDebt: d.securedDebt || 0,
    taxDebt: d.taxDebt || 0,
    personalDebt: j.personal_debt || 0,
    overdueDays: j.overdue_days || 0,
    assets: d.assets || 0,
    assetsDetail: j.assets_detail || '',
    badges: Object.keys(d.flags||{}).filter(k=>d.flags[k]).join(','),
    memo: j.memo || '',
    reductionRate: d.rehoReduce ? (d.rehoReduce*100).toFixed(1)+'%' : '',
    monthlyPayment: d.rehoMonthly || d.newstartMonthly || 0,
    paymentPeriod: d.youngMonths ? d.youngMonths+'개월' : '36개월'
  };

  // 로딩 표시
  txtNarr.value = '🤖 AI 상담일지 생성 중...\n\n' + templateNote;
  txtEval.value = '🤖 AI 평가표 생성 중...\n\n' + templateEval;

  fetch(SHEET_API, {
    method: 'POST',
    headers: {'Content-Type': 'text/plain'},
    body: JSON.stringify(payload)
  })
  .then(r => r.json())
  .then(res => {
    if (res.success && res.consultation_note) {
      txtNarr.value = res.consultation_note + '\n\n── 수치 분석 ──\n' + templateNote;
      txtEval.value = res.evaluation_note + '\n\n── 수치 분석 ──\n' + templateEval;
    } else {
      // AI 실패 시 템플릿만 유지
      txtNarr.value = templateNote;
      txtEval.value = templateEval;
    }
  })
  .catch(err => {
    console.warn('AI 생성 실패:', err);
    txtNarr.value = templateNote;
    txtEval.value = templateEval;
  });
}
